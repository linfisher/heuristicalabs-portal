<svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="220" height="280" fill="#141414"/>

  <!-- Isometric tile top face -->
  <polygon points="110,36 190,78 190,178 110,220 30,178 30,78" fill="#1a1510" stroke="#c99b3a" stroke-width="1.2"/>

  <!-- Top-face inner hex ring (gasket line) -->
  <polygon points="110,56 174,90 174,162 110,196 46,162 46,90" fill="none" stroke="#c99b3a" stroke-width="0.6" stroke-dasharray="4 3"/>

  <!-- Center circle (actuator housing) -->
  <circle cx="110" cy="128" r="22" fill="none" stroke="#c99b3a" stroke-width="1.2"/>
  <circle cx="110" cy="128" r="10" fill="#c99b3a" opacity="0.15"/>
  <circle cx="110" cy="128" r="3" fill="#c99b3a" opacity="0.5"/>

  <!-- Mounting points at hex corners -->
  <circle cx="110" cy="58" r="4" fill="none" stroke="#c99b3a" stroke-width="1"/>
  <circle cx="172" cy="92" r="4" fill="none" stroke="#c99b3a" stroke-width="1"/>
  <circle cx="172" cy="162" r="4" fill="none" stroke="#c99b3a" stroke-width="1"/>
  <circle cx="110" cy="196" r="4" fill="none" stroke="#c99b3a" stroke-width="1"/>
  <circle cx="48" cy="162" r="4" fill="none" stroke="#c99b3a" stroke-width="1"/>
  <circle cx="48" cy="92" r="4" fill="none" stroke="#c99b3a" stroke-width="1"/>

  <!-- Radial spokes from center to mounting points -->
  <line x1="110" y1="128" x2="110" y2="66" stroke="#c99b3a" stroke-width="0.4" opacity="0.4"/>
  <line x1="110" y1="128" x2="166" y2="97" stroke="#c99b3a" stroke-width="0.4" opacity="0.4"/>
  <line x1="110" y1="128" x2="166" y2="158" stroke="#c99b3a" stroke-width="0.4" opacity="0.4"/>
  <line x1="110" y1="128" x2="110" y2="188" stroke="#c99b3a" stroke-width="0.4" opacity="0.4"/>
  <line x1="110" y1="128" x2="54" y2="158" stroke="#c99b3a" stroke-width="0.4" opacity="0.4"/>
  <line x1="110" y1="128" x2="54" y2="97" stroke="#c99b3a" stroke-width="0.4" opacity="0.4"/>

  <!-- Connector plug (bottom-right edge) -->
  <rect x="168" y="122" width="18" height="12" rx="2" fill="#1a1510" stroke="#c99b3a" stroke-width="0.8"/>
  <line x1="172" y1="125" x2="172" y2="131" stroke="#c99b3a" stroke-width="0.7"/>
  <line x1="176" y1="125" x2="176" y2="131" stroke="#c99b3a" stroke-width="0.7"/>
  <line x1="180" y1="125" x2="180" y2="131" stroke="#c99b3a" stroke-width="0.7"/>

  <!-- Label -->
  <text x="110" y="246" text-anchor="middle" font-family="monospace" font-size="8" fill="#c99b3a" letter-spacing="2" opacity="0.7">FLOOR TILE v19</text>
  <text x="110" y="260" text-anchor="middle" font-family="monospace" font-size="7" fill="#555" letter-spacing="1">INTERACTIVE 3D</text>
</svg>
