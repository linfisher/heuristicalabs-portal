<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Limit Chess — Introduction Deck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100%; }

    .deck {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      height: 100vh;
    }

    .slide {
      scroll-snap-align: start;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
    }

    .dots {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.2s;
    }

    .dot.active { background: #fff; }

    .back {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 100;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }

    .back:hover { color: #fff; }
  </style>
</head>
<body>

  <a href="/" class="back">← Heuristica Labs</a>
  <nav class="dots" id="dots"></nav>

  <div class="deck" id="deck">
    <div class="slide"><img src="/nlc-slides/slide-01.jpeg" alt="Slide 1" /></div>
    <div class="slide"><img src="/nlc-slides/slide-02.jpeg" alt="Slide 2" /></div>
    <div class="slide"><img src="/nlc-slides/slide-03.jpeg" alt="Slide 3" /></div>
    <div class="slide"><img src="/nlc-slides/slide-04.jpeg" alt="Slide 4" /></div>
    <div class="slide"><img src="/nlc-slides/slide-05.jpeg" alt="Slide 5" /></div>
    <div class="slide"><img src="/nlc-slides/slide-06.jpeg" alt="Slide 6" /></div>
    <div class="slide"><img src="/nlc-slides/slide-07.jpeg" alt="Slide 7" /></div>
    <div class="slide"><img src="/nlc-slides/slide-08.jpeg" alt="Slide 8" /></div>
  </div>

  <script>
    const deck = document.getElementById('deck');
    const slides = deck.querySelectorAll('.slide');
    const dotsEl = document.getElementById('dots');

    slides.forEach((_, i) => {
      const btn = document.createElement('button');
      btn.className = 'dot' + (i === 0 ? ' active' : '');
      btn.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(btn);
    });

    const dots = dotsEl.querySelectorAll('.dot');

    function goTo(i) {
      slides[i].scrollIntoView({ behavior: 'smooth' });
    }

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const i = Array.from(slides).indexOf(e.target);
          dots.forEach((d, j) => d.classList.toggle('active', j === i));
        }
      });
    }, { root: deck, threshold: 0.5 });

    slides.forEach(s => observer.observe(s));

    document.addEventListener('keydown', e => {
      const active = Array.from(dots).findIndex(d => d.classList.contains('active'));
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') goTo(Math.min(active + 1, slides.length - 1));
      if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') goTo(Math.max(active - 1, 0));
    });
  </script>
</body>
</html>
